workflows:
  android-build:
    name: JarvisAI Debug Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    scripts:
      - name: Gradle Build Debug
        script: |
          cd JarvisAI
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

    artifacts:
      - JarvisAI/app/build/outputs/apk/debug/*.apk
